name: Compose Stability Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  compose-stability:
    name: Analyze Compose Stability
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Compose compiler reports
        run: |
          ./gradlew assembleDebug \
            -Pkotlin.incremental=false \
            -Pandroidx.compose.compiler.reportsDestination=${{ github.workspace }}/compose_reports \
            -Pandroidx.compose.compiler.metricsDestination=${{ github.workspace }}/compose_reports \
            --no-daemon \
            --stacktrace
        continue-on-error: true

      - name: Analyze stability reports
        id: analyze
        run: |
          python3 .github/scripts/analyze_compose_stability.py \
            --reports-dir "${{ github.workspace }}/compose_reports" \
            --output-file stability_report.md \
            --json-output stability_report.json

      - name: Upload full reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compose-stability-reports
          path: |
            compose_reports/
            stability_report.md
            stability_report.json
          retention-days: 30

      - name: Read PR comment content
        id: read_report
        if: always()
        run: |
          if [ -f stability_report.md ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
            # GitHub has 65536 char limit on step outputs - truncate if needed
            CONTENT=$(cat stability_report.md)
            echo "content<<REPORT_EOF" >> $GITHUB_OUTPUT
            echo "$CONTENT" >> $GITHUB_OUTPUT
            echo "REPORT_EOF" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        # Zmieniony warunek: wykonuje się TYLKO podczas Pull Requestów
        if: always() && steps.read_report.outputs.report_exists == 'true' && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('stability_report.md', 'utf8');

            // Find and delete previous bot comment if exists
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report,
            });

      - name: Fail if unstable components found
        run: |
          if [ -f stability_report.json ]; then
            UNSTABLE=$(python3 -c "
            import json, sys
            with open('stability_report.json') as f:
              data = json.load(f)
            sys.exit(0 if data.get('unstable_count', 0) == 0 else 1)
            ")
          fi