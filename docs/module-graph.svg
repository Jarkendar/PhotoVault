<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .layer-label { fill: #888; font-size: 12px; }
      .module { stroke-width: 1; }
      .app { fill: #EAEAEA; stroke: #999; }
      .feature { fill: #E6DFF5; stroke: #7F77DD; }
      .data { fill: #E1F5EE; stroke: #1D9E75; }
      .source { fill: #E1F5EE; stroke: #1D9E75; }
      .domain { fill: #FAEEDA; stroke: #BA7517; }
      .test { fill: #EAEAEA; stroke: #999; }
      .title { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .subtitle { font-size: 11px; fill: #5F5E5A; }
      .edge { stroke: #888; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <!-- App layer -->
  <text class="layer-label" x="30" y="35">App</text>
  <rect class="module app" x="370" y="50" width="160" height="48" rx="6"/>
  <text class="title" x="450" y="72" text-anchor="middle">:app</text>
  <text class="subtitle" x="450" y="88" text-anchor="middle">navigation, DI graph</text>

  <!-- Feature layer -->
  <text class="layer-label" x="30" y="140">Features</text>
  <rect class="module feature" x="50" y="155" width="180" height="60" rx="6"/>
  <text class="title" x="140" y="178" text-anchor="middle">:feature:gallery</text>
  <text class="subtitle" x="140" y="195" text-anchor="middle">grid + detail screens</text>

  <rect class="module feature" x="260" y="155" width="180" height="60" rx="6"/>
  <text class="title" x="350" y="178" text-anchor="middle">:feature:upload</text>
  <text class="subtitle" x="350" y="195" text-anchor="middle">picker + auto-tag</text>

  <rect class="module feature" x="470" y="155" width="180" height="60" rx="6"/>
  <text class="title" x="560" y="178" text-anchor="middle">:feature:search</text>
  <text class="subtitle" x="560" y="195" text-anchor="middle">query + filters</text>

  <rect class="module feature" x="680" y="155" width="180" height="60" rx="6"/>
  <text class="title" x="770" y="178" text-anchor="middle">:feature:settings</text>
  <text class="subtitle" x="770" y="195" text-anchor="middle">tweaks + manage</text>

  <!-- Core: data (orchestration) -->
  <text class="layer-label" x="30" y="265">Core / data (orchestration)</text>
  <rect class="module data" x="370" y="280" width="160" height="60" rx="6"/>
  <text class="title" x="450" y="303" text-anchor="middle">:core:data</text>
  <text class="subtitle" x="450" y="320" text-anchor="middle">repositories, sync</text>

  <!-- Core: sources -->
  <text class="layer-label" x="30" y="385">Core / sources</text>
  <rect class="module source" x="50" y="400" width="180" height="60" rx="6"/>
  <text class="title" x="140" y="423" text-anchor="middle">:core:network</text>
  <text class="subtitle" x="140" y="440" text-anchor="middle">Ktor client + DTO</text>

  <rect class="module source" x="260" y="400" width="180" height="60" rx="6"/>
  <text class="title" x="350" y="423" text-anchor="middle">:core:database</text>
  <text class="subtitle" x="350" y="440" text-anchor="middle">Room cache + DAO</text>

  <rect class="module source" x="470" y="400" width="180" height="60" rx="6"/>
  <text class="title" x="560" y="423" text-anchor="middle">:core:ml</text>
  <text class="subtitle" x="560" y="440" text-anchor="middle">on-device tagging</text>

  <!-- Domain + foundation -->
  <text class="layer-label" x="30" y="505">Core / domain &amp; foundation</text>
  <rect class="module domain" x="50" y="520" width="180" height="60" rx="6"/>
  <text class="title" x="140" y="543" text-anchor="middle">:core:domain</text>
  <text class="subtitle" x="140" y="560" text-anchor="middle">Photo, Tag, interfaces</text>

  <rect class="module domain" x="260" y="520" width="180" height="60" rx="6"/>
  <text class="title" x="350" y="543" text-anchor="middle">:core:ui</text>
  <text class="subtitle" x="350" y="560" text-anchor="middle">PhotoGrid, chips, theme</text>

  <rect class="module domain" x="470" y="520" width="180" height="60" rx="6"/>
  <text class="title" x="560" y="543" text-anchor="middle">:core:common</text>
  <text class="subtitle" x="560" y="560" text-anchor="middle">dispatchers, result, utils</text>

  <!-- Test fixtures -->
  <text class="layer-label" x="30" y="625">Test (shared)</text>
  <rect class="module test" x="370" y="640" width="160" height="44" rx="6"/>
  <text class="title" x="450" y="660" text-anchor="middle">:test:fixtures</text>
  <text class="subtitle" x="450" y="676" text-anchor="middle">fakes, test photos</text>

  <!-- Edges: app -> features -->
  <path class="edge" d="M 410 98 L 140 155" marker-end="url(#arrow)"/>
  <path class="edge" d="M 430 98 L 350 155" marker-end="url(#arrow)"/>
  <path class="edge" d="M 470 98 L 560 155" marker-end="url(#arrow)"/>
  <path class="edge" d="M 490 98 L 770 155" marker-end="url(#arrow)"/>

  <!-- Edges: features -> core:data -->
  <path class="edge" d="M 200 215 L 410 280" marker-end="url(#arrow)"/>
  <path class="edge" d="M 360 215 L 440 280" marker-end="url(#arrow)"/>
  <path class="edge" d="M 540 215 L 470 280" marker-end="url(#arrow)"/>
  <path class="edge" d="M 720 215 L 490 280" marker-end="url(#arrow)"/>

  <!-- Edges: core:data -> sources -->
  <path class="edge" d="M 410 340 L 180 400" marker-end="url(#arrow)"/>
  <path class="edge" d="M 450 340 L 350 400" marker-end="url(#arrow)"/>
  <path class="edge" d="M 490 340 L 520 400" marker-end="url(#arrow)"/>

  <!-- Edges: sources -> domain -->
  <path class="edge" d="M 120 460 L 120 520" marker-end="url(#arrow)"/>
  <path class="edge" d="M 330 460 L 170 520" marker-end="url(#arrow)"/>
  <path class="edge" d="M 540 460 L 200 520" marker-end="url(#arrow)"/>

  <!-- Edges: core:ui -> core:domain (ui depends on domain for types) -->
  <path class="edge" d="M 300 540 L 230 540" marker-end="url(#arrow)"/>

  <!-- Edges: features also depend directly on core:ui and core:common -->
  <path class="edge" d="M 100 215 C 50 400, 50 470, 290 530" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <path class="edge" d="M 830 215 C 880 400, 880 470, 620 530" marker-end="url(#arrow)" stroke-dasharray="3 3"/>

  <!-- Legend -->
  <g transform="translate(680, 35)">
    <text class="layer-label" x="0" y="0">Legend</text>
    <line x1="0" y1="15" x2="30" y2="15" class="edge" marker-end="url(#arrow)"/>
    <text class="subtitle" x="38" y="19">main dependency</text>
    <line x1="0" y1="32" x2="30" y2="32" class="edge" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
    <text class="subtitle" x="38" y="36">features → core:ui/common</text>
  </g>
</svg>
